name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...
      - run: go vet ./...

  docker-build:
    runs-on: ${{ matrix.runner }}
    needs: build
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            platform-pair: linux-amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            platform-pair: linux-arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Go version from go.mod
        id: goversion
        run: echo "version=$(grep '^go ' go.mod | cut -d' ' -f2 | cut -d'.' -f1,2)" >> "$GITHUB_OUTPUT"
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/cobexer/cert-manager-webhook-duckdns
      - uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          build-args: GOLANG_VERSION=${{ steps.goversion.outputs.version }}
          outputs: type=image,name=ghcr.io/cobexer/cert-manager-webhook-duckdns,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=ghcr.io/cobexer/cert-manager-webhook-duckdns:buildcache-${{ matrix.platform-pair }}
          cache-to: type=registry,ref=ghcr.io/cobexer/cert-manager-webhook-duckdns:buildcache-${{ matrix.platform-pair }},mode=max
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.platform-pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-merge:
    runs-on: ubuntu-latest
    needs: docker-build
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/cobexer/cert-manager-webhook-duckdns
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Create and push multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/cobexer/cert-manager-webhook-duckdns@sha256:%s ' *)

  helm:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v5
      - name: Strip v-prefix for Helm version
        id: chartversion
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Package Helm chart
        run: |
          helm package deploy/cert-manager-webhook-duckdns \
            --version ${{ steps.chartversion.outputs.version }} \
            --app-version ${{ steps.chartversion.outputs.version }}
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin
      - name: Push Helm chart to GHCR
        run: |
          helm push cert-manager-webhook-duckdns-${{ steps.chartversion.outputs.version }}.tgz \
            oci://ghcr.io/cobexer/charts

  create-release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Create GitHub Release
        run: gh release create "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
