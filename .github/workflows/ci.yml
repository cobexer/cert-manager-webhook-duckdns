name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: ['*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go vet ./...

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Extract Go version from go.mod
        id: goversion
        run: echo "version=$(grep '^go ' go.mod | cut -d' ' -f2 | cut -d'.' -f1,2)" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          build-args: GOLANG_VERSION=${{ steps.goversion.outputs.version }}
          tags: ghcr.io/cobexer/cert-manager-webhook-duckdns:dev
