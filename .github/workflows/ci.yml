name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: ['*']

env:
  CI_VERSION: 0.0.0-dev

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...
      - run: go vet ./...

  helm:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v5
      - name: Lint Helm chart
        run: helm lint deploy/cert-manager-webhook-duckdns
      - name: Package Helm chart
        run: helm package deploy/cert-manager-webhook-duckdns --version ${{ env.CI_VERSION }} --app-version ${{ env.CI_VERSION }}

  docker:
    runs-on: ${{ matrix.runner }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            platform-pair: linux-amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            platform-pair: linux-arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Extract Go version from go.mod
        id: goversion
        run: echo "version=$(grep '^go ' go.mod | cut -d' ' -f2 | cut -d'.' -f1,2)" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          build-args: GOLANG_VERSION=${{ steps.goversion.outputs.version }}
          tags: ghcr.io/cobexer/cert-manager-webhook-duckdns:${{ env.CI_VERSION }}
          cache-from: type=gha,scope=${{ matrix.platform-pair }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform-pair }}
